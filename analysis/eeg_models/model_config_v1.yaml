schema_version: 1
pipeline_version: model_validation_v1

authority:
  stage18_authority_fingerprint: 685cdf04bb9d638b69e7b216f656ae4088659c7570bc3b451f8daafc80a8f43b
  stage18_validation_status: pass
  expected_general_rows: 43990
